<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熔炉 ForgeShell</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 首次配置页面 -->
<div id="setup-page">
  <div class="setup-card">
    <div class="setup-logo">🔥</div>
    <h1>欢迎使用熔炉</h1>
    <p class="setup-subtitle">以意为炉，以语为锤，铸代码之剑</p>
    <p class="setup-desc">请输入你的 DeepSeek API Key 开始使用</p>
    <input id="setup-key" type="password" placeholder="sk-xxxxxxxxxxxxxxxx" autofocus>
    <p class="setup-hint">Key 以 sk- 开头 · 去 <a href="https://platform.deepseek.com" target="_blank">DeepSeek 开放平台</a> 获取</p>
    <button id="setup-btn">保存并开始使用</button>
    <p id="setup-msg"></p>
  </div>
</div>

<!-- 主界面（初始隐藏） -->
<div id="app" style="display:none">
  <header id="topbar">
    <span class="logo">🔥 熔炉</span>
    <span id="topbar-cost">💰 ¥0.0000 | 94%</span>
    <span id="topbar-cost">💰 ¥0.0000 | 94%</span>
  <button id="session-end-btn" title="结束会话并复盘" style="margin-left:auto;padding:4px 12px;background:var(--purple);color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px">结束</button>
</header>
  <main id="main">
    <aside id="sidebar">
      <div style="padding:8px;color:var(--gold);font-size:12px;border-bottom:1px solid var(--bg3)">📋 进化状态</div>
      <div id="evo-stats" style="padding:8px;font-size:11px;color:var(--text-dim)">
        经验: - | SOP: - | 成功率: -
      </div>
      <div style="padding:8px;color:var(--gold);font-size:12px;border-bottom:1px solid var(--bg3)">💬 历史会话</div>
      <div id="conversation-list" style="padding:8px;font-size:11px;color:var(--text-dim)">暂无历史</div>
    </aside>
    <section id="chat">
      <div id="messages"></div>
      <div id="streaming"></div>
    </section>
    <aside id="panels">
      <div class="panel-tabs">
        <button class="panel-tab active" data-panel="project">📊 项目</button>
        <button class="panel-tab" data-panel="cost">💰 费用</button>
      </div>
      <div id="panel-project" class="panel-content active"></div>
      <div id="panel-cost" class="panel-content"></div>
    </aside>
  </main>
  <footer id="bottombar">
    <div class="mode-selector">
      <button class="mode-btn" data-mode="plan">规划</button>
      <button class="mode-btn active" data-mode="assist">助手</button>
      <button class="mode-btn" data-mode="speed">极速</button>
    </div>
    <input id="user-input" type="text" placeholder="输入你的指令…" autofocus>
    <button id="send-btn">发送</button>
  </footer>
</div>

<div id="review-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center">
  <div style="background:var(--bg2);border:1px solid var(--purple);border-radius:12px;padding:32px;max-width:500px;width:90%">
    <h3 style="color:var(--gold);margin-bottom:16px">🔍 复盘本次对话</h3>
    <p style="color:var(--text-dim);margin-bottom:12px;font-size:14px">将匿名策略数据提交到经验熔池，帮助熔炉进化。</p>
    <div id="review-preview" style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:16px;max-height:200px;overflow-y:auto;font-size:12px;color:var(--text-dim)"></div>
    <p style="color:var(--red);font-size:11px;margin-bottom:16px">✓ 不上传代码、文件路径、API Key、变量名</p>
    <div style="display:flex;gap:8px">
      <button id="review-submit-btn" style="flex:1;padding:10px;background:var(--purple);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">提交复盘</button>
      <button id="review-skip-btn" style="flex:1;padding:10px;background:var(--bg3);color:var(--text);border:none;border-radius:8px;cursor:pointer;font-size:14px">跳过</button>
    </div>
    <p id="review-msg" style="margin-top:12px;font-size:13px;text-align:center"></p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
