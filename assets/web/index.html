<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熔炉 ForgeShell</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 首次配置 -->
<div id="setup-page">
  <div class="setup-card">
    <div class="setup-logo">🔥</div>
    <h1>欢迎使用熔炉</h1>
    <p class="setup-subtitle">以意为炉，以语为锤，铸代码之剑</p>
    <p class="setup-desc">请输入你的 DeepSeek API Key 开始使用</p>
    <input id="setup-key" type="password" placeholder="sk-xxxxxxxxxxxxxxxx" autofocus>
    <p class="setup-hint">Key 以 sk- 开头 · 去 <a href="https://platform.deepseek.com" target="_blank">DeepSeek 开放平台</a> 获取</p>
    <button id="setup-btn">保存并开始使用</button>
    <p id="setup-msg"></p>
  </div>
</div>

<!-- 主界面 -->
<div id="app" style="display:none">

  <!-- 更新条 -->
  <div id="update-banner" style="display:none">
    <span id="update-text"></span>
    <button id="update-btn">立即更新</button>
  </div>

  <!-- 顶部栏 -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo">🔥 熔炉</span>
      <span class="version">v</span>
    </div>
    <div class="mode-selector">
      <button class="mode-btn" data-mode="plan">规划</button>
      <button class="mode-btn active" data-mode="assist">助手</button>
      <button class="mode-btn" data-mode="speed">极速</button>
    </div>
    <div class="topbar-right">
      <span id="topbar-cost">💰 ¥0.0000</span>
      <span id="topbar-hit">94%</span>
      <button id="session-end-btn">结束</button>
    </div>
  </header>

  <!-- 主体三栏 -->
  <div id="main">
    <!-- 左：文件树 -->
    <aside id="left-panel">
      <div class="panel-header" id="file-tree-header">📁 项目文件 <span style="font-size:10px;color:var(--text-dim)">(点击读取)</span></div>
      <div id="file-tree">加载中…</div>
    </aside>

    <!-- 中：对话区 -->
    <section id="chat">
      <div id="messages"></div>
      <div id="streaming-area" style="display:none">
        <div class="thinking-indicator">
          <span class="thinking-dot"></span><span class="thinking-dot"></span><span class="thinking-dot"></span>
          <span id="thinking-status">思考中…</span>
        </div>
        <div id="streaming-content"></div>
      </div>
    </section>

    <!-- 右：工作台 -->
    <aside id="right-panel">
      <div class="panel-section">
        <div class="panel-header">🔧 工具</div>
        <div id="tools-grid">
          <button class="tool-chip" onclick="executeTool('exec', prompt('命令：'))">exec</button>
          <button class="tool-chip" onclick="executeTool('read', prompt('文件路径：'))">read</button>
          <button class="tool-chip" onclick="executeTool('search', prompt('搜索：'))">search</button>
          <button class="tool-chip" onclick="executeTool('web', prompt('搜索：'))">web</button>
          <button class="tool-chip" onclick="executeTool('lsp', '')">lsp</button>
          <button class="tool-chip" onclick="executeTool('auto-fix', '')">fix</button>
          <button class="tool-chip" onclick="executeTool('rollback', '')">↩</button>
          <button class="tool-chip" onclick="executeTool('explore', '')">explore</button>
          <button class="tool-chip" onclick="executeTool('save', prompt('记忆内容：'))">save</button>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-header">💰 费用</div>
        <div id="cost-mini">
          <div style="font-size:20px;color:var(--gold)" id="cost-val">¥0.0000</div>
          <div style="font-size:11px;color:var(--text-dim)">缓存 <span id="hit-val" style="color:var(--green)">94%</span></div>
          <div style="font-size:11px;color:var(--text-dim)">vs Claude <span id="savings-val" style="color:var(--green)">96%</span></div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-header">🧠 进化</div>
        <div id="evo-mini" style="font-size:11px;color:var(--text-dim)">
          经验: - | SOP: - | 成功率: -
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-header">📋 最近会话</div>
        <div id="recent-sessions" style="font-size:11px;color:var(--text-dim)">
          暂无历史
        </div>
      </div>
    </aside>
  </div>

  <!-- 底部输入栏 -->
  <footer id="bottombar">
    <div class="input-wrapper">
      <input id="user-input" type="text" placeholder="输入指令… (Enter 发送)" autofocus>
      <button id="send-btn">发送</button>
    </div>
  </footer>
</div>

<!-- 复盘弹窗 -->
<div id="review-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center">
  <div style="background:var(--bg2);border:1px solid var(--purple);border-radius:12px;padding:32px;max-width:500px;width:90%">
    <h3 style="color:var(--gold);margin-bottom:16px">🔍 复盘本次对话</h3>
    <p style="color:var(--text-dim);margin-bottom:12px;font-size:14px">将匿名策略数据提交到经验熔池，帮助熔炉进化。</p>
    <div id="review-preview" style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:16px;max-height:200px;overflow-y:auto;font-size:12px;color:var(--text-dim)"></div>
    <p style="color:var(--red);font-size:11px;margin-bottom:16px">✓ 不上传代码、文件路径、API Key、变量名</p>
    <div style="display:flex;gap:8px">
      <button id="review-submit-btn" style="flex:1;padding:10px;background:var(--purple);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">提交复盘</button>
      <button id="review-skip-btn" style="flex:1;padding:10px;background:var(--bg3);color:var(--text);border:none;border-radius:8px;cursor:pointer;font-size:14px">跳过</button>
    </div>
    <p id="review-msg" style="margin-top:12px;font-size:13px;text-align:center"></p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
