<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熔炉 ForgeShell</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 首次配置 -->
<div id="setup-page">
  <div class="setup-card">
    <div class="setup-logo">&#x1F525;</div>
    <h1>欢迎使用熔炉</h1>
    <p class="setup-subtitle">以意为炉，以语为锤，铸代码之剑</p>
    <p class="setup-desc">请输入你的 DeepSeek API Key 开始使用</p>
    <input id="setup-key" type="password" placeholder="sk-xxxxxxxxxxxxxxxx" autofocus>
    <p class="setup-hint">Key 以 sk- 开头 &middot; 去 <a href="https://platform.deepseek.com" target="_blank">DeepSeek 开放平台</a> 获取</p>
    <button id="setup-btn">保存并开始使用</button>
    <p id="setup-msg"></p>
  </div>
</div>

<!-- 主界面：单列对话流 -->
<div id="app" style="display:none">
  <header id="topbar">
    <span class="logo">&#x1F525; 熔炉</span>
    <div class="mode-selector">
      <button class="mode-btn" data-mode="plan">规划</button>
      <button class="mode-btn active" data-mode="assist">助手</button>
      <button class="mode-btn" data-mode="speed">极速</button>
    </div>
    <select id="model-select" onchange="setModelPref(this.value)">
      <option value="auto" selected>智能</option>
      <option value="pro">Pro</option>
      <option value="flash">Flash</option>
      <option value="local">本地</option>
    </select>
    <div class="topbar-right">
      <span id="sessions-toggle" onclick="toggleSessions()" title="会话历史">📋</span>
      <span id="topbar-cost">¥0.0000</span>
      <span id="topbar-version" class="version-badge">v0.21.0</span>
      <span id="err-count-badge" class="err-count-badge ok" onclick="toggleErrorPanel()">✓</span>
    </div>
  </header>

  <div id="main-area">
    <aside id="sessions-panel" style="display:none">
      <button id="new-session-btn" onclick="newSession()" style="width:100%;margin-bottom:10px;padding:8px;background:var(--purple);color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--font)">＋ 新建会话</button>
      <div class="panel-hdr">📋 最近会话</div>
      <div id="sessions-list">加载中…</div>
    </aside>
    <section id="chat">
      <div id="messages"></div>
    </section>
  </div>

  <footer id="bottombar">
    <div class="input-wrapper">
      <input id="user-input" type="text" placeholder="输入指令… (Enter 发送)" autofocus>
      <button id="send-btn">发送</button>
    </div>
  </footer>
</div>

<!-- 错误日志面板（按需弹出） -->
<div id="error-panel" style="display:none">
  <div class="ep-header">
    <h3>错误日志</h3>
    <div>
      <button onclick="refreshErrorLogs()">刷新</button>
      <button onclick="clearErrorLogs()">清空</button>
      <button onclick="document.getElementById('error-panel').style.display='none'">✕</button>
    </div>
  </div>
  <div id="diagnosis-box"></div>
  <div id="error-log-list">加载中…</div>
</div>

<script src="app.js"></script>
</body>
</html>
