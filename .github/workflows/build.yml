name: 构建与测试

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: 测试 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 运行测试
        run: cargo test --verbose

      - name: Clippy 检查
        run: cargo clippy -- -D warnings

  build-windows:
    name: 构建 Windows 静态二进制
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 构建 Release
        run: cargo build --release --profile release-windows

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: forge-shell-windows-x86_64
          path: target/release/forge-shell.exe

  build-linux:
    name: 构建 Linux Musl 静态二进制
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: 安装 musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: 构建 Release (Musl)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: 验证静态链接
        run: |
          ldd target/x86_64-unknown-linux-musl/release/forge-shell || echo "静态链接验证通过"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: forge-shell-linux-x86_64-musl
          path: target/x86_64-unknown-linux-musl/release/forge-shell

  build-ohos:
    name: 构建鸿蒙 Linux 静态二进制
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: 安装 musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: 构建 Release (鸿蒙兼容)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: forge-shell-ohos-x86_64
          path: target/x86_64-unknown-linux-musl/release/forge-shell

  release:
    name: 发布 GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, build-ohos]
    permissions:
      contents: write
    steps:
      - name: 下载 Windows exe
        uses: actions/download-artifact@v4
        with:
          name: forge-shell-windows-x86_64
          path: artifacts/

      - name: 下载 Linux binary
        uses: actions/download-artifact@v4
        with:
          name: forge-shell-linux-x86_64-musl
          path: artifacts/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            artifacts/forge-shell.exe
            artifacts/forge-shell
          draft: false
          prerelease: false
